<!DOCTYPE html>
<html>
<head>
<title>Martinez Concrete Design</title>

<style>

body {
margin: 0;
font-family: Arial, sans-serif;
color: white;
background: url("bg.jpg");
background-size: cover;
background-attachment: fixed;
}


/* HEADER */

header {
background: rgba(0,0,0,0.5);
padding: 20px;
text-align: center;
font-size: 35px;
font-weight: bold;
backdrop-filter: blur(6px);
}


/* NAV */

nav {
background: rgba(0,0,0,0.3);
text-align: center;
padding: 10px;
}

nav a {
color: white;
margin: 15px;
text-decoration: none;
font-size: 18px;
}

nav a:hover {
color: lightgray;
}


/* HERO */

.hero {
text-align: center;
padding: 150px 20px;
background: rgba(0,0,0,0.4);
}

.hero h1 {
font-size: 45px;
}

button {
background: rgba(255,255,255,0.1);
border: 1px solid white;
color: white;
padding: 12px 20px;
font-size: 16px;
cursor: pointer;
}

button:hover {
background: rgba(255,255,255,0.3);
}


/* SERVICES */

.services {
background: rgba(0,0,0,0.6);
padding: 40px;
text-align: center;
}

.card {
display: inline-block;
width: 220px;
margin: 10px;
background: rgba(255,255,255,0.1);
border-radius: 10px;
overflow: hidden;
}

.card img {
width: 100%;
height: 150px;
object-fit: cover;
}

.card h3 {
padding: 10px;
}


/* GALLERY */

.gallery {
background: rgba(0,0,0,0.7);
padding: 40px;
text-align: center;
}

.gallery img {
width: 250px;
margin: 10px;
border-radius: 8px;
}


/* CONTACT */

footer {
background: rgba(0,0,0,0.8);
padding: 20px;
text-align: center;
}

</style>

</head>
<body>


<header>
Martinez Concrete Design
</header>


<nav>
<a href="#">Home</a>

<a href="#gallery">Gallery</a>
<a href="#contact">Contact</a>
</nav>

Call 469-406-7588

<div class="card">
