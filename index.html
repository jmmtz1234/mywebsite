<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Martinez Concrete Design</title>

<style>

/* Smooth Scroll */
html {
scroll-behavior: smooth;
}

/* Body */
body {
margin: 0;
font-family: Arial, sans-serif;
color: white;
background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)),
url("feature.jpg");
background-size: cover;
background-position: center;
background-attachment: fixed;
}

/* Header */
header {
background: rgba(0,0,0,0.8);
padding: 20px;
text-align: center;
font-size: 30px;
font-weight: bold;
letter-spacing: 2px;
}

/* Navigation */
nav {
background: rgba(0,0,0,0.6);
text-align: center;
padding: 12px;
}

nav a {
color: white;
margin: 15px;
text-decoration: none;
font-size: 18px;
font-weight: bold;
}

nav a:hover {
color: #ccc;
}

/* Hero Section */
.hero {
text-align: center;
padding: 140px 20px;
}

.hero h1 {
font-size: 46px;
margin-bottom: 20px;
}

.hero p {
font-size: 20px;
margin-bottom: 30px;
}

button {
background: transparent;
border: 2px solid white;
color: white;
padding: 12px 30px;
font-size: 18px;
cursor: pointer;
border-radius: 5px;
}

button:hover {
background: white;
color: black;
}

/* Services Section */
.services {
background: rgba(0,0,0,0.9);
padding: 60px 20px;
text-align: center;
}

.services h2 {
margin-bottom: 40px;
font-size: 32px;
}

.card {
display: inline-block;
width: 280px;
margin: 15px;
background: rgba(255,255,255,0.05);
border-radius: 10px;
overflow: hidden;
transition: 0.3s;
}

.card:hover {
transform: scale(1.05);
}

.card img {
width: 100%;
height: 200px;
object-fit: cover;
}

.card h3 {
padding: 15px;
}

/* Gallery Section */
.gallery {
background: rgba(0,0,0,0.95);
padding: 60px 20px;
text-align: center;
}

.gallery h2 {
font-size: 32px;
margin-bottom: 30px;
}

.gallery img {
width: 80%;
max-width: 900px;
border-radius: 10px;
}

/* Contact */
footer {
background: black;
padding: 40px 20px;
text-align: center;
}

footer h2 {
margin-bottom: 20px;
}

/* Mobile Responsive */
@media (max-width: 768px) {

.hero h1 {
font-size: 32px;
}

.card {
width: 90%;
}

}

</style>
</head>


<body id="top">

<header>
Martinez Concrete Design
</header>

<nav>
<a href="#top">Home</a>
<a href="#services">Services</a>
<a href="#gallery">Gallery</a>
<a href="#contact">Contact</a>
</nav>

<div class="hero">
<h1>Strong Concrete. Clean Design.</h1>
<p>Driveways • Patios • Custom Concrete</p>
<button onclick="location.href='tel:4694067588'">
Call 469-406-7588
</button>
</div>

<div class="services" id="services">
<h2>Our Services</h2>

<div class="card">
<img src="driveway.jpg" alt="Driveway">
<h3>Driveways</h3>
</div>

<div class="card">
<img src="patio.jpg" alt="Patio">
<h3>Patios</h3>
</div>

<div class="card">
<img src="custom.jpg" alt="Custom Concrete">
<h3>Custom Concrete</h3>
</div>

</div>

<div class="gallery" id="gallery">
<h2>Featured Project</h2>
<img src="feature.jpg" alt="Featured Concrete Project">
</div>

<footer id="contact">
<h2>Contact Us</h2>
<p>Phone: 469-406-7588</p>
<p>Email: lugojose40@gmail.com</p>
<p>Princeton, TX</p>
</footer>

</body>
</html>
