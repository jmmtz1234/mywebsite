<!DOCTYPE html>

<head>
<title>Martinez Concrete Design</title>

<style>

body {
  margin: 0;
  font-family: Arial, sans-serif;
  color: white;
}

/* HEADER */

header {
  background: rgba(0,0,0,0.7);
  padding: 20px;
  text-align: center;
  font-size: 35px;
  font-weight: bold;
  color: orange;
}

nav {
  background: rgba(0,0,0,0.6);
  padding: 10px;
  text-align: center;
}

nav a {
  color: white;
  margin: 15px;
  text-decoration: none;
  font-size: 18px;
}

/* HERO BACKGROUND */

.hero {
  background-image: url("https://images.unsplash.com/photo-1581092160607-ee22731d8c6b");
  background-size: cover;
  background-position: center;
  padding: 150px 20px;
  text-align: center;
}

/* DARK OVERLAY */

.hero::before {
  content: "";
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 500px;
  background: rgba(0,0,0,0.6);
}

.hero h1 {
  font-size: 55px;
  color: orange;
  position: relative;
}

/* TRANSPARENT BUTTON */

.button {
  border: 2px solid orange;
  color: orange;
  padding: 15px 25px;
  display: inline-block;
  margin-top: 20px;
  font-weight: bold;
  text-decoration: none;
  background: transparent;
  position: relative;
}

.button:hover {
  background: orange;
  color: black;
}

/* SECTION */

.section {
  background: #111;
  padding: 40px;
  text-align: center;
}

/* SERVICES */

.services {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 20px;
}

.card {
  background: #222;
  padding: 15px;
  width: 250px;
  border-radius: 10px;
}

.card img {
  width: 100%;
  border-radius: 10px;
}

/* CONTACT */

.contact {
  background: black;
  padding: 40px;
  text-align: center;
}

footer {
  background: #000;
  text-align: center;
  padding: 20px;
}

</style>
</head>
